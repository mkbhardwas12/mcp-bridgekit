services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  bridgekit:
    build: .
    ports: ["8000:8000"]
    depends_on:
      - redis
    environment:
      - MCP_BRIDGEKIT_REDIS_URL=redis://redis:6379
  worker:
    build: .
    command: mcp-bridgekit-worker
    depends_on:
      - redis
    environment:
      - MCP_BRIDGEKIT_REDIS_URL=redis://redis:6379
